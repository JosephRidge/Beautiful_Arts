<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gallery • Beautiful Arts</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="assets/style/css/main.min.css">
	<link rel="shortcut icon" href="assets/svg/logo.svg" type="image/x-icon">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<style>
		body { font-family: "Poppins", sans-serif; }
		#hero {
			background-image: url("assets/images/museum_art.jpg");
			background-size: cover;
			background-position: center;
			position: relative;
			min-height: 50vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		#hero::after {
			content: "";
			position: absolute;
			inset: 0;
			background: rgba(0,0,0,.55);
		}
		#hero h1 { position: relative; z-index: 1; }
		.gallery-item img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
		.gallery-item {
			border-radius: .5rem;
			overflow: hidden;
			transition: transform .2s ease, box-shadow .2s ease;
			background: #000;
		}
		.gallery-item:hover {
			transform: scale(1.02);
			box-shadow: 0 1rem 2rem rgba(0,0,0,.25);
		}
	</style>
</head>
<body class="d-flex flex-column min-vh-100">
	<nav class="navbar navbar-expand-lg bg-primary">
		<div class="container py-3">
			<a class="navbar-brand text-light" href="index.html#home">
				<img src="assets/svg/logo.svg" alt="logo" width="40" class="me-2"> Beautiful Arts
			</a>
			<button class="navbar-toggler bg-warning rounded-5" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="nav">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link text-light" href="index.html#home">Home</a></li>
					<li class="nav-item"><a class="nav-link text-light active" href="gallery.html">Gallery</a></li>
					<li class="nav-item dropdown">
						<a class="nav-link dropdown-toggle text-light" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">More</a>
						<ul class="dropdown-menu">
							<li><a class="dropdown-item" href="about.html">About Us</a></li>
							<li><a class="dropdown-item" href="sponsorship.html">Sponsorship</a></li>
							<li><a class="dropdown-item" href="contact.html">Contact Us</a></li>
						</ul>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<header id="hero" class="text-center text-warning">
		<h1 class="display-4 fw-bold">Our Art Collection</h1>
	</header>

	<main class="container my-5">
		<div class="row g-4">
			<div class="col-12 col-sm-6 col-lg-4">
				<div class="gallery-item ratio ratio-4x3">
					<img src="assets/images/wall-painted drawings.jpg" alt="Wall painted drawings">
				</div>
			</div>
			<div class="col-12 col-sm-6 col-lg-4">
				<div class="gallery-item ratio ratio-4x3">
					<img src="assets/images/globe.jpg" alt="Globe">
				</div>
			</div>
			<div class="col-12 col-sm-6 col-lg-4">
				<div class="gallery-item ratio ratio-4x3">
					<img src="assets/images/sketch.jpg" alt="Sketch">
				</div>
			</div>
			<div class="col-12 col-sm-6 col-lg-4">
				<div class="gallery-item ratio ratio-4x3">
					<img src="assets/images/cookery.jpg" alt="Cookery">
				</div>
			</div>
			<div class="col-12 col-sm-6 col-lg-4">
				<div class="gallery-item ratio ratio-4x3">
					<img src="assets/images/Table.jpg" alt="Table">
				</div>
			</div>
			<div class="col-12 col-sm-6 col-lg-4">
				<div class="gallery-item ratio ratio-4x3">
					<img src="assets/images/stool.jpg" alt="Stool">
				</div>
			</div>
			<div class="col-12 col-sm-6 col-lg-4">
				<div class="gallery-item ratio ratio-4x3">
					<img src="assets/images/coolors.jpg" alt="Coolors artwork">
				</div>
			</div>
			<div class="col-12 col-sm-6 col-lg-4">
				<div class="gallery-item ratio ratio-4x3">
					<img src="assets\images\museum_art.jpg" alt="Tim Gouw artwork">
				</div>
			</div>
		</div>
	</main>

	

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
